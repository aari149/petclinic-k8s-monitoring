apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-alert
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: email-alert

    receivers:
      - name: slack-alert
        slack_configs:
          - api_url: "REPLACE_WITH_SLACK_WEBHOOK"
            channel: "#devops-alerts"
            send_resolved: true

      - name: email-alert
        email_configs:
          - to: "your-email@gmail.com"
            from: "your-email@gmail.com"
            smarthost: "smtp.gmail.com:587"
            auth_username: "your-email@gmail.com"
            auth_password: "REPLACE_APP_PASSWORD"
            require_tls: true
