apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  namespace: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
      - name: petclinic
        image: ashwiniethiraj/petclinic:v1
        ports:
        - containerPort: 8080
